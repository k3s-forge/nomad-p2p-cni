name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Build
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libbpf-dev libelf-dev zlib1g-dev
          make build-bpf
          make build-bin
      - name: Vet
        run: go vet ./...
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: nomad-p2p
          path: bin/