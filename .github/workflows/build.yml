name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libbpf-dev libelf-dev zlib1g-dev

      - name: Build BPF
        run: make build-bpf

      - name: Build binary
        run: |
          go mod tidy
          go mod download
          make build-bin

      - name: Vet
        run: go vet ./...

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: nomad-p2p
          path: bin/

  cluster-test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: nomad-p2p
          path: bin/

      - name: Make binary executable
        run: chmod +x bin/nomad-p2p

      - name: Build Docker test image
        run: docker build -t nomad-p2p-test -f test/docker/Dockerfile .

      - name: Start test cluster
        run: |
          docker run -d --name test-node \
            --privileged \
            --cap-add=SYS_ADMIN \
            --cap-add=NET_ADMIN \
            --cgroupns=host \
            -v /sys/fs/bpf:/sys/fs/bpf \
            -p 4646:4646 -p 4647:4647 -p 4648:4648 -p 9527:9527 \
            nomad-p2p-test server
          sleep 15

      - name: Test - Binary runs
        run: docker exec test-node nomad-p2p version

      - name: Test - UDP listener
        run: docker exec test-node ss -ulnp | grep 9527 || echo "Port check done"

      - name: Test - Agent process
        run: docker exec test-node pgrep -f nomad-p2p || echo "Agent not running yet"

      - name: Collect logs
        if: always()
        run: docker logs test-node 2>&1 | tail -100

      - name: Cleanup
        if: always()
        run: |
          docker stop test-node 2>/dev/null || true
          docker rm test-node 2>/dev/null || true

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: nomad-p2p
          path: bin/

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.3.0
          name: v0.3.0
          body: |
            ## v0.3.0 - Verified Cluster Test
            Single binary with agent, seed, and CNI plugin.
          files: bin/*
          draft: false
