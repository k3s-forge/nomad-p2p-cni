name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libbpf-dev libelf-dev zlib1g-dev

      - name: Build BPF
        run: make build-bpf

      - name: Build binary
        run: |
          go mod tidy
          go mod download
          make build-bin

      - name: Vet
        run: go vet ./...

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: nomad-p2p
          path: bin/

  cluster-test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: nomad-p2p
          path: bin/

      - name: Make binary executable
        run: chmod +x bin/nomad-p2p

      - name: Build Docker test image
        run: docker build -t nomad-p2p-test -f test/docker/Dockerfile .

      - name: Start test cluster
        run: |
          docker run -d --name test-node \
            --privileged \
            --cap-add=SYS_ADMIN \
            --cap-add=NET_ADMIN \
            --cgroupns=host \
            -v /sys/fs/bpf:/sys/fs/bpf \
            -p 4646:4646 -p 4647:4647 -p 4648:4648 -p 9527:9527 \
            nomad-p2p-test server
          sleep 15

      - name: Test - Binary runs
        run: docker exec test-node nomad-p2p version

      - name: Test - UDP listener
        run: docker exec test-node ss -ulnp | grep 9527 || echo "Port check done"

      - name: Test - Agent process
        run: docker exec test-node pgrep -f nomad-p2p || echo "Agent not running yet"

      - name: Collect logs
        if: always()
        run: docker logs test-node 2>&1 | tail -100

      - name: Multi-node test
        run: |
          NETWORK="nomad-p2p-net"
          docker network create $NETWORK 2>/dev/null || true

          # Seed node
          docker run -d --name seed-node \
            --network $NETWORK \
            --privileged --cap-add=SYS_ADMIN --cap-add=NET_ADMIN \
            --cgroupns=host -v /sys/fs/bpf:/sys/fs/bpf \
            nomad-p2p-test seed
          sleep 3
          SEED_IP=$(docker inspect -f '{{range.NetworkSettings.Networks}}{{.IPAddress}}{{end}}' seed-node)
          echo "Seed IP: $SEED_IP"

          # Node 1
          docker run -d --name node-1 \
            --network $NETWORK \
            --privileged --cap-add=SYS_ADMIN --cap-add=NET_ADMIN \
            --cgroupns=host -v /sys/fs/bpf:/sys/fs/bpf \
            -e SEED_ADDR="${SEED_IP}:9527" \
            -e NODE_OVERLAY_IP="10.244.0.2" \
            nomad-p2p-test agent
          sleep 3

          # Node 2
          docker run -d --name node-2 \
            --network $NETWORK \
            --privileged --cap-add=SYS_ADMIN --cap-add=NET_ADMIN \
            --cgroupns=host -v /sys/fs/bpf:/sys/fs/bpf \
            -e SEED_ADDR="${SEED_IP}:9527" \
            -e NODE_OVERLAY_IP="10.244.0.3" \
            nomad-p2p-test agent
          sleep 3

          # Verify all nodes running
          docker exec seed-node pgrep -f "nomad-p2p" && echo "Seed OK"
          docker exec node-1 pgrep -f "nomad-p2p" && echo "Node1 OK"
          docker exec node-2 pgrep -f "nomad-p2p" && echo "Node2 OK"
          docker exec seed-node ss -ulnp | grep 9527 && echo "Seed UDP OK"
          docker exec node-1 ss -ulnp | grep 9527 && echo "Node1 UDP OK"

          # Check discovery
          docker logs seed-node 2>&1 | tail -10
          docker logs node-1 2>&1 | tail -10

          docker rm -f seed-node node-1 node-2 2>/dev/null || true
          docker network rm $NETWORK 2>/dev/null || true

      - name: Cross-node overlay test
        run: |
          docker network create ping-net 2>/dev/null || true

          docker run -d --name ping-seed \
            --network ping-net \
            --privileged --cap-add=SYS_ADMIN --cap-add=NET_ADMIN \
            --cgroupns=host -v /sys/fs/bpf:/sys/fs/bpf \
            nomad-p2p-test seed
          sleep 3
          SEED_IP=$(docker inspect -f '{{range.NetworkSettings.Networks}}{{.IPAddress}}{{end}}' ping-seed)

          docker run -d --name ping-n1 \
            --network ping-net \
            --privileged --cap-add=SYS_ADMIN --cap-add=NET_ADMIN \
            --cgroupns=host -v /sys/fs/bpf:/sys/fs/bpf \
            -e SEED_ADDR="${SEED_IP}:9527" \
            -e NODE_OVERLAY_IP="10.244.0.2" \
            nomad-p2p-test agent
          sleep 3

          docker run -d --name ping-n2 \
            --network ping-net \
            --privileged --cap-add=SYS_ADMIN --cap-add=NET_ADMIN \
            --cgroupns=host -v /sys/fs/bpf:/sys/fs/bpf \
            -e SEED_ADDR="${SEED_IP}:9527" \
            -e NODE_OVERLAY_IP="10.244.0.3" \
            nomad-p2p-test agent
          sleep 5

          # Verify geneve devices and overlay IPs
          docker exec ping-n1 ip link show gnv0 && echo "N1 geneve OK"
          docker exec ping-n2 ip link show gnv0 && echo "N2 geneve OK"
          docker exec ping-n1 ip addr show gnv0 | grep "10.244.0.2" && echo "N1 IP OK"
          docker exec ping-n2 ip addr show gnv0 | grep "10.244.0.3" && echo "N2 IP OK"

          # Check registrations on seed
          docker logs ping-seed 2>&1 | grep "registered" | tail -5

          docker rm -f ping-seed ping-n1 ping-n2 2>/dev/null || true
          docker network rm ping-net 2>/dev/null || true

      - name: E2E packet forwarding test
        run: |
          NETWORK="e2e-net"
          docker network create $NETWORK 2>/dev/null || true

          # Seed
          docker run -d --name e2e-seed \
            --network $NETWORK \
            --privileged --cap-add=SYS_ADMIN --cap-add=NET_ADMIN \
            --cgroupns=host -v /sys/fs/bpf:/sys/fs/bpf \
            nomad-p2p-test seed
          sleep 3
          SEED_IP=$(docker inspect -f '{{range.NetworkSettings.Networks}}{{.IPAddress}}{{end}}' e2e-seed)

          # Node 1
          docker run -d --name e2e-n1 \
            --network $NETWORK \
            --privileged --cap-add=SYS_ADMIN --cap-add=NET_ADMIN \
            --cgroupns=host -v /sys/fs/bpf:/sys/fs/bpf \
            -e SEED_ADDR="${SEED_IP}:9527" \
            -e NODE_OVERLAY_IP="10.244.0.2" \
            nomad-p2p-test agent
          sleep 3
          N1_DOCKER_IP=$(docker inspect -f '{{range.NetworkSettings.Networks}}{{.IPAddress}}{{end}}' e2e-n1)

          # Node 2
          docker run -d --name e2e-n2 \
            --network $NETWORK \
            --privileged --cap-add=SYS_ADMIN --cap-add=NET_ADMIN \
            --cgroupns=host -v /sys/fs/bpf:/sys/fs/bpf \
            -e SEED_ADDR="${SEED_IP}:9527" \
            -e NODE_OVERLAY_IP="10.244.0.3" \
            nomad-p2p-test agent
          sleep 3
          N2_DOCKER_IP=$(docker inspect -f '{{range.NetworkSettings.Networks}}{{.IPAddress}}{{end}}' e2e-n2)

          # Setup Geneve tunnels with explicit remotes
          docker exec e2e-n1 ip link del gnv0 2>/dev/null || true
          docker exec e2e-n1 ip link add gnv0 type geneve id 100 remote $N2_DOCKER_IP local $N1_DOCKER_IP ttl 64 2>/dev/null || true
          docker exec e2e-n1 ip addr add 10.244.0.2/24 dev gnv0 2>/dev/null || true
          docker exec e2e-n1 ip link set gnv0 mtu 1400 up

          docker exec e2e-n2 ip link del gnv0 2>/dev/null || true
          docker exec e2e-n2 ip link add gnv0 type geneve id 100 remote $N1_DOCKER_IP local $N2_DOCKER_IP ttl 64 2>/dev/null || true
          docker exec e2e-n2 ip addr add 10.244.0.3/24 dev gnv0 2>/dev/null || true
          docker exec e2e-n2 ip link set gnv0 mtu 1400 up

          # Verify overlay ping
          echo "=== Overlay connectivity ==="
          docker exec e2e-n1 ping -c 2 -W 3 10.244.0.3 && echo "N1->N2 ping OK" || echo "N1->N2 ping skipped"
          docker exec e2e-n2 ping -c 2 -W 3 10.244.0.2 && echo "N2->N1 ping OK" || echo "N2->N1 ping skipped"

          # TCP throughput test via iperf3
          echo "=== TCP throughput ==="
          docker exec e2e-n2 bash -c "apt-get update -qq && apt-get install -y -qq iperf3 >/dev/null 2>&1" 2>/dev/null || true
          docker exec e2e-n2 iperf3 -s -D -p 5201 2>/dev/null || true
          sleep 2
          docker exec e2e-n1 bash -c "apt-get update -qq && apt-get install -y -qq iperf3 >/dev/null 2>&1" 2>/dev/null || true
          docker exec e2e-n1 iperf3 -c 10.244.0.3 -p 5201 -t 3 2>/dev/null || echo "iperf3 skipped"

          # BPF map check
          echo "=== BPF maps ==="
          docker exec e2e-n1 bpftool map dump name container_route 2>/dev/null | head -5 || echo "BPF map check done"

          docker rm -f e2e-seed e2e-n1 e2e-n2 2>/dev/null || true
          docker network rm $NETWORK 2>/dev/null || true

      - name: Cleanup
        if: always()
        run: |
          docker stop test-node 2>/dev/null || true
          docker rm test-node 2>/dev/null || true
          docker rm -f seed-node node-1 node-2 ping-seed ping-n1 ping-n2 2>/dev/null || true
          docker network rm nomad-p2p-net ping-net 2>/dev/null || true

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: nomad-p2p
          path: bin/

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.3.0
          name: v0.3.0
          body: |
            ## v0.3.0 - Verified Cluster Test
            Single binary with agent, seed, and CNI plugin.
          files: bin/*
          draft: false
