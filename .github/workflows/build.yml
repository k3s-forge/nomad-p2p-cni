name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install BPF build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            llvm \
            libbpf-dev \
            linux-headers-generic \
            libelf-dev \
            zlib1g-dev

      - name: Verify BPF headers
        run: |
          echo "=== Checking BPF headers ==="
          ls -la /usr/include/bpf/ 2>/dev/null || echo "No /usr/include/bpf/"
          dpkg -L libbpf-dev 2>/dev/null | head -20 || echo "libbpf-dev not found"
          find /usr/include -name "bpf_helpers.h" 2>/dev/null || echo "bpf_helpers.h not found"

      - name: Build BPF programs
        run: make build-bpf

      - name: Build Go binaries
        run: |
          make build-agent
          make build-seed
          make build-cni

      - name: Run go vet
        run: go vet ./...

      - name: List built artifacts
        run: ls -la bin/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nomad-p2p-cni-binaries
          path: bin/

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install BPF build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libbpf-dev libelf-dev zlib1g-dev

      - name: Build all
        run: make all

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.1.0
          name: v0.1.0
          body: |
            eBPF P2P CNI for Nomad - Initial Release
            
            Features:
            - Zero veth container networking (bpf_redirect_peer)
            - Geneve overlay tunnel
            - STUN NAT traversal
            - Kernel IPsec encryption
            - VIP load balancing
            - TC ACL firewall
          files: |
            bin/*
          draft: false
