name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install BPF build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libbpf-dev libelf-dev zlib1g-dev

      - name: Build BPF programs
        run: make build-bpf

      - name: Resolve Go dependencies
        run: |
          go mod tidy
          go mod download

      - name: Build agent (verbose)
        run: go build -v -o bin/nomad-p2p-agent ./cmd/agent 2>&1

      - name: Build seed (verbose)
        run: go build -v -o bin/nomad-p2p-seed ./cmd/seed 2>&1

      - name: Build cni (verbose)
        run: go build -v -o bin/nomad-p2p-cni ./cmd/cni 2>&1

      - name: Run go vet
        run: go vet ./...

      - name: List built artifacts
        run: ls -la bin/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nomad-p2p-cni-binaries
          path: bin/

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install BPF build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libbpf-dev libelf-dev zlib1g-dev

      - name: Build all
        run: |
          go mod tidy
          go mod download
          make all

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.1.0
          name: v0.1.0
          body: "eBPF P2P CNI for Nomad - Initial Release"
          files: bin/*
          draft: false
