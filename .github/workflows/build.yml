name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libbpf-dev libelf-dev zlib1g-dev

      - name: Build BPF
        run: make build-bpf

      - name: Build binary
        run: |
          go mod tidy
          go mod download
          make build-bin

      - name: Vet
        run: go vet ./...

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: nomad-p2p
          path: bin/

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libbpf-dev libelf-dev zlib1g-dev

      - name: Build all
        run: |
          go mod tidy
          go mod download
          make all

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.2.0
          name: v0.2.0
          body: |
            ## v0.2.0 - Unified Binary
            
            Single binary `nomad-p2p` with three modes:
            - `nomad-p2p agent` - control plane daemon
            - `nomad-p2p agent --seed-mode` - also run as seed registry
            - `nomad-p2p cni` - CNI plugin
          files: bin/*
          draft: false
