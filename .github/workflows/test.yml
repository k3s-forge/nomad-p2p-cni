name: Cluster Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install BPF dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libbpf-dev libelf-dev zlib1g-dev

      - name: Build binary
        run: |
          go mod tidy
          make all

      - name: Verify binary
        run: |
          ./bin/nomad-p2p version
          file ./bin/nomad-p2p
          ls -la ./bin/

      - name: Start test cluster (Docker)
        run: |
          docker build -t nomad-p2p-test -f test/docker/Dockerfile .
          docker run -d --name test-node \
            --privileged \
            --cap-add=SYS_ADMIN \
            --cap-add=NET_ADMIN \
            --cgroupns=host \
            -v /sys/fs/bpf:/sys/fs/bpf \
            -p 4646:4646 -p 4647:4647 -p 4648:4648 -p 9527:9527 \
            nomad-p2p-test server
          echo "Waiting for cluster startup..."
          sleep 10

      - name: Check cluster status
        run: |
          echo "=== Docker container ==="
          docker ps
          echo ""
          echo "=== Container logs ==="
          docker logs test-node 2>&1 | tail -30

      - name: Run integration tests
        run: |
          echo "=== Test 1: Binary version ==="
          docker exec test-node nomad-p2p version

          echo ""
          echo "=== Test 2: Agent process ==="
          docker exec test-node pgrep -f "nomad-p2p agent" && echo "Agent running" || echo "Agent NOT running"

          echo ""
          echo "=== Test 3: UDP listener ==="
          docker exec test-node ss -ulnp | grep ":9527" && echo "Port 9527 OK" || echo "Port 9527 NOT listening"

          echo ""
          echo "=== Test 5: Nomad ==="
          docker exec test-node nomad status 2>/dev/null || echo "Nomad check skipped"

          echo ""
          echo "=== Test 6: Deploy test job ==="
          docker exec test-node bash -c 'cat > /tmp/test.nomad <<JOB
job "test" {
  datacenters = ["dc1"]
  group "app" {
    count = 1
    task "run" {
      driver = "raw_exec"
      config { command = "echo" args = ["hello from nomad-p2p"] }
    }
  }
}
JOB
nomad job run /tmp/test.nomad 2>&1' || echo "Job deploy check"

          echo ""
          echo "=== Test 7: Check allocations ==="
          sleep 3
          docker exec test-node nomad job status test 2>/dev/null || echo "Alloc check skipped"

          echo ""
          echo "=== All integration tests completed ==="

      - name: Collect logs on failure
        if: failure()
        run: |
          docker logs test-node 2>&1 > test-logs.txt
          echo "--- test-logs.txt ---"
          cat test-logs.txt

      - name: Cleanup
        if: always()
        run: |
          docker stop test-node 2>/dev/null || true
          docker rm test-node 2>/dev/null || true

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: test-logs.txt
          if-no-files-found: ignore
